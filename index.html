<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🚗 YOLO Car Detection</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            font-family: 'Segoe UI', sans-serif;
        }

        .card {
            border-radius: 15px;
            padding: 20px;
            background: white;
            color: black;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .upload-box {
            border: 2px dashed #007bff;
            padding: 30px;
            cursor: pointer;
        }

        .upload-box:hover {
            background-color: #f1f1f1;
        }

        .result-success {
            color: green;
            font-weight: bold;
        }

        .result-fail {
            color: red;
            font-weight: bold;
        }

        #preview {
            max-width: 100%;
            margin-top: 15px;
            display: none;
        }

        #loader {
            display: none;
        }
    </style>
</head>

<body>

<div class="container mt-5">
    <div class="text-center mb-4">
        <h1>🚗 YOLO Car Detection</h1>
        <p>Upload an image to detect cars using AI</p>
    </div>

    <div class="card mx-auto" style="max-width: 500px;">
        
        <form method="POST" enctype="multipart/form-data" onsubmit="showLoader()">

            <div class="upload-box text-center" onclick="document.getElementById('fileInput').click();">
                <p>📂 Click or Drag Image Here</p>
                <input type="file" name="file" id="fileInput" hidden onchange="previewImage(event)" required>
            </div>

            <img id="preview" />

            <div class="text-center mt-3">
                <button class="btn btn-primary">Detect</button>
            </div>

        </form>

        <div id="loader" class="text-center mt-3">
            <div class="spinner-border text-primary"></div>
            <p>Processing...</p>
        </div>

        {% if result %}
            <div class="text-center mt-4">
                {% if "Car" in result %}
                    <h3 class="result-success">{{ result }}</h3>
                {% else %}
                    <h3 class="result-fail">{{ result }}</h3>
                {% endif %}
            </div>
        {% endif %}

        {% if image %}
            <div class="text-center mt-3">
                <img src="{{ image }}" class="img-fluid rounded">
            </div>
        {% endif %}

    </div>
</div>

<script>
function previewImage(event) {
    let reader = new FileReader();
    reader.onload = function(){
        let output = document.getElementById('preview');
        output.src = reader.result;
        output.style.display = "block";
    };
    reader.readAsDataURL(event.target.files[0]);
}

function showLoader() {
    document.getElementById("loader").style.display = "block";
}
</script>

</body>
</html>
